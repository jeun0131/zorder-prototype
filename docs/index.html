<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f9f9f7;
        --surface: #ffffff;
        --border: rgba(0, 0, 0, 0.12);
        --text: #1a1a18;
        --muted: #73726c;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a18;
          --surface: #242420;
          --border: rgba(255, 255, 255, 0.1);
          --text: #e8e6de;
          --muted: #888780;
        }
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 2.5rem 1.5rem;
      }

      .container {
        max-width: 920px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      h1 {
        font-size: 22px;
        font-weight: 500;
      }

      .search-input {
        flex: 1;
        max-width: 300px;
        padding: 7px 12px;
        border: 0.5px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        font-size: 14px;
        color: var(--text);
        outline: none;
        -webkit-appearance: none;
      }
      .search-input:focus {
        border-color: rgba(128, 128, 128, 0.4);
      }
      .search-input::placeholder {
        color: var(--muted);
      }

      .count {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
        min-height: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }

      .card-title {
        font-size: 15px;
        font-weight: 500;
      }
      .card-date {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        flex-shrink: 0;
      }
      .card-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }

      .open-btn {
        margin-top: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 7px 14px;
        border: 0.5px solid var(--border);
        border-radius: 8px;
        background: transparent;
        text-decoration: none;
        font-size: 13px;
        color: var(--text);
        transition: background 0.15s;
      }
      .open-btn:hover {
        background: rgba(128, 128, 128, 0.07);
      }

      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 3rem;
        color: var(--muted);
        font-size: 14px;
      }

      mark {
        background: #faeeda;
        color: #854f0b;
        border-radius: 2px;
        padding: 0 1px;
      }
      @media (prefers-color-scheme: dark) {
        mark {
          background: #412402;
          color: #fac775;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Projects</h1>
        <input
          type="search"
          id="search"
          class="search-input"
          placeholder="검색..."
          autocomplete="off"
        />
      </header>
      <p class="count" id="count"></p>
      <div class="grid" id="grid"></div>
    </div>

    <script>
      // ================================================================
      // 새 프로젝트 추가 시 이 배열에만 항목을 추가하면 됩니다.
      //
      // 필드 설명
      //   id          : 폴더명 (필수). url 생략 시 ./{id}/app.html 을 사용
      //   title       : 카드에 표시할 이름 (필수)
      //   description : 짧은 설명 (필수)
      //   date        : "YYYY-MM" 형식 (선택)
      //   url         : 직접 경로를 지정하고 싶을 때만 작성 (선택)
      // ================================================================
      const PROJECTS = [
        {
          id: "prototype-tier-guest",
          title: "Tier Guest",
          description: "게스트 티어 관련 기능 프로토타입",
          date: "2025-01",
        },
      ];
      // ================================================================

      function escape(str) {
        return str.replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      function highlight(text, query) {
        if (!query) return escape(text);
        const re = new RegExp(
          `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
          "gi",
        );
        return escape(text).replace(re, "<mark>$1</mark>");
      }

      const grid = document.getElementById("grid");
      const count = document.getElementById("count");
      const search = document.getElementById("search");

      function render(rawQuery) {
        const q = rawQuery.trim().toLowerCase();

        const filtered = q
          ? PROJECTS.filter(
              (p) =>
                p.title.toLowerCase().includes(q) ||
                p.description.toLowerCase().includes(q),
            )
          : PROJECTS;

        count.textContent = q
          ? `${PROJECTS.length}개 중 ${filtered.length}개`
          : `${PROJECTS.length}개`;

        grid.innerHTML = "";

        if (filtered.length === 0) {
          grid.innerHTML = '<p class="empty">검색 결과가 없습니다.</p>';
          return;
        }

        for (const p of filtered) {
          const url = p.url ?? `./${p.id}/app.html`;
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
          <div class="card-header">
            <span class="card-title">${highlight(p.title, q)}</span>
            ${p.date ? `<span class="card-date">${p.date}</span>` : ""}
          </div>
          <p class="card-desc">${highlight(p.description, q)}</p>
          <a href="${url}" class="open-btn">열기</a>
        `;
          grid.appendChild(card);
        }
      }

      search.addEventListener("input", (e) => render(e.target.value));
      render("");
    </script>
  </body>
</html>
